name: Scheduled and Manual Report Sync

on:
  workflow_dispatch:
    inputs:
      report_date:
        description: 'Enter report date (YYYY-MM-DD). Leave empty for auto-Friday sync.'
        required: false
  schedule:
    # Runs every Sunday at 17:00 UTC
    - cron: '0 17 * * 0'

jobs:
  sync_job:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests

      - name: Execute Fetch Script
        run: |
          if [ -n "${{ github.event.inputs.report_date }}" ]; then
            python fetch_reports.py "${{ github.event.inputs.report_date }}"
          else
            python fetch_reports.py
          fi

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "Sync reports (Auto-target Friday from Sunday run)" || echo "No changes"
          git push
