name: Scheduled and Manual Report Sync

"on":
  workflow_dispatch:
    inputs:
      report_date:
        description: 'Zadejte datum (RRRR-MM-DD) nebo nechte prázdné pro automatický pátek'
        required: false
  schedule:
    - cron: '30 1 * * 2'     # produkční: úterý 01:30 UTC
    - cron: '30 11 * * 2'    # TEST: úterý 11:30 UTC (dnes 13:30 SELČ) — odstranit po ověření
    - cron: '*/5 * * * *'    # TEST: každých 5 minut — IHNED ODSTRANIT po ověření
jobs:
  sync_job:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests

      - name: Execute Fetch Script
        run: |
          if [ -n "${{ github.event.inputs.report_date }}" ]; then
            python fetch_reports.py "${{ github.event.inputs.report_date }}"
          else
            python fetch_reports.py
          fi

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "Auto-sync report for last Friday" || echo "No changes to commit"
          git push
