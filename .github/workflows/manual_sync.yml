name: Manual Report Sync

on:
  workflow_dispatch:
    inputs:
      report_date:
        description: 'Enter report date (YYYY-MM-DD)'
        required: true
        default: '2026-05-01'

jobs:
  sync_job:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests

      - name: Execute Fetch Script
        run: python fetch_reports.py "${{ github.event.inputs.report_date }}"

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "Sync reports for ${{ github.event.inputs.report_date }}" || echo "No changes to commit"
          git push
